server:
  port: 8080

spring:
  application:
    name: payment-service
  config:
    import: "configserver:"
  data:
    redis:
      host: host
      port: 1234
      username: username
      password: password
  datasource:
    url: url
    username: username
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-service
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
