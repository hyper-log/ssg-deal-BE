server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: "configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-service
    gateway:
      discovery:
        locator:
          enabled: true # 서비스 디스커버리로 동적 라우트 생성
      auth:
        login:
          endpoint: /api/v1/auth/login
        signup:
          endpoint: /api/v1/auth/signup
        base:
          url: http://localhost:8082
        validate:
          endpoint: /internal/v1/auth/validate
      routes:
        - id: auth-service # 인증 서비스
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

        - id: cart-service # 장바구니 서비스
          uri: lb://cart-service
          predicates:
            - Path=/api/v1/carts/**

        - id: inquiry-service # 문의 서비스
          uri: lb://inquiry-service
          predicates:
            - Path=/api/v1/inquirys/**

        - id: notification-service # 알림 서비스
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

        - id: order-service # 주문 서비스
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**

        - id: payment-service # 결제 서비스
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**

        - id: promotion-service # 프로모션 서비스
          uri: lb://promotion-service
          predicates:
            - Path=/api/v1/promotions/**

        - id: user-service # 사용자 서비스
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  tracing:
    sampling:
      probability: 1.0  # 100% of the requests will be traced

  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans" # Zipkin 서버 주소
      connect-timeout: 1s  # Timeout for connecting to Zipkin server
      encoding: json  # The format of the trace data (you can use json or protobuf)
      read-timeout: 10s  # Timeout for reading from the Zipkin server

logging:
  pattern:
    level: "%5p [%X{traceId:-},%X{spanId:-}]"
