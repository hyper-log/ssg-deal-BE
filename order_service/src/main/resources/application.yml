server:
  port: 8080
spring:
  application:
    name: order-service
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
  config:
    import: "configserver:"
  datasource:
    url: url
    username: user
    password: password
  data:
    redis:
      host: host
      port: 1234
      username: username
      password: password
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-service
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
springdoc:
  swagger-ui:
    enabled: true
    path: /docs
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    enabled: true
    path: /api-docs-order-service