server:
  port: 8080
spring:
  application:
    name: order-service
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
  config:
    import: "configserver:"
  datasource:
    url: url
    username: user
    password: password
  data:
    redis:
      host: host
      port: 1234
      username: username
      password: password
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-service
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
springdoc:
  swagger-ui:
    enabled: true
    path: /docs
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    enabled: true
    path: /api-docs-order-service

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  tracing:
    sampling:
      probability: 1.0  # 100% of the requests will be traced

  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans" # Zipkin 서버 주소
      connect-timeout: 1s  # Timeout for connecting to Zipkin server
      encoding: json  # The format of the trace data (you can use json or protobuf)
      read-timeout: 10s  # Timeout for reading from the Zipkin server

logging:
  pattern:
    level: "%5p [%X{traceId:-},%X{spanId:-}]"
