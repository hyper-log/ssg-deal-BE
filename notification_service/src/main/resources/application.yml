server:
  port: 8020

spring:
  application:
    name: notification_service
  config:
    import: "optional:configserver:"
  data:
    redis:
      host: host
      port: 1234
      username: username
      password: password
  cloud:
    config:
      discovery:
        enabled: false
        service-id: config_service

  profiles:
    active: dev

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

slack:
  base-url: https://slack.com/api
  bot:
    token: ${SLACK_BOT_TOKEN}
